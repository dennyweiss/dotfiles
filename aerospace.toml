# AeroSpace Configuration for German QWERTZ Keyboard

# Start AeroSpace at login
start-at-login = false

# Commands to run after AeroSpace startup
# 'exec-and-forget sketchybar',
after-startup-command = [
    'exec-and-forget borders'
]

# Callback when workspace changes (integrates with SketchyBar)
#exec-on-workspace-change = [
#    '/bin/bash', '-c',
#    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
#]

# Normalization settings
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout settings
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Don't automatically hide apps
automatically-unhide-macos-hidden-apps = false

# Keyboard layout for German QWERTZ
[key-mapping]
    preset = 'qwerty'
# Note: Use physical key positions, AeroSpace handles the layout

# Window gaps (Catppuccin aesthetic)
[gaps]
    inner.horizontal = 10
    inner.vertical = 10
    outer.left = 6
    outer.bottom = 6
    outer.top = 6    # Space for SketchyBar `50`
    outer.right = 6

# Main binding mode - German keyboard compatible
[mode.main.binding]

# Use Alt (Option) as main modifier (German keyboard friendly)
# Avoid Ctrl+Alt combinations as they conflict with AltGr on German keyboards

# Layout management
alt-shift-comma = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion vertical horizontal'

# Focus navigation (HJKL - VI-style)
alt-h = 'focus left'
alt-u = 'focus up'
alt-j = 'focus down'
alt-k = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-u = 'move up'
alt-shift-j = 'move down'
alt-shift-k = 'move right'

# Resize windows
alt-o = 'resize smart -50'
alt-shift-o = 'resize smart -400'
alt-p = 'resize smart +50'
alt-shift-p = 'resize smart +400'

# Workspace navigation (1-9 and letters)
# These work on German QWERTZ keyboards
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'

alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Letter-based workspaces (A-Z)
alt-t = 'workspace Terminal_1'  # Terminal
alt-w = 'workspace Web_1'  # Web
alt-i = 'workspace IDE_1'  # Editor
alt-c = 'workspace Communication_1'  # Communication
alt-ctrl-t = 'workspace Terminal_2'  # Terminal
alt-ctrl-w = 'workspace Web_2'  # Web
alt-ctrl-i = 'workspace IDE_2'  # Editor
alt-ctrl-c = 'workspace Communication_2'  # Communication

# Move windows to workspaces (with focus follows)
alt-shift-1 = ['move-node-to-workspace 1 --focus-follows-window']
alt-shift-2 = ['move-node-to-workspace 2 --focus-follows-window']
alt-shift-3 = ['move-node-to-workspace 3 --focus-follows-window']

alt-shift-7 = ['move-node-to-workspace 7 --focus-follows-window']
alt-shift-8 = ['move-node-to-workspace 8 --focus-follows-window']
alt-shift-9 = ['move-node-to-workspace 9 --focus-follows-window']

alt-shift-t = ['move-node-to-workspace Terminal_1 --focus-follows-window']
alt-shift-w = ['move-node-to-workspace Web_1 --focus-follows-window']
alt-shift-i = ['move-node-to-workspace IDE_1 --focus-follows-window']
alt-shift-c = ['move-node-to-workspace Communication_1 --focus-follows-window']

alt-ctrl-shift-t = ['move-node-to-workspace Terminal_2 --focus-follows-window']
alt-ctrl-shift-w = ['move-node-to-workspace Web_2 --focus-follows-window']
alt-ctrl-shift-i = ['move-node-to-workspace IDE_2 --focus-follows-window']
alt-ctrl-shift-c = ['move-node-to-workspace Communication_2 --focus-follows-window']

# Workspace back and forth
alt-tab = 'workspace-back-and-forth'

# Multi-monitor support
# @TODO add multimonitor setup
# alt-f1 = 'move-workspace-to-monitor left'
# alt-f2 = 'move-workspace-to-monitor right'

# Enter service mode
alt-ctrl-shift-comma = 'mode service'
[workspace-to-monitor-force-assignment]
1 = ['main']
2 = ['main']
3 = ['main']

7 = ['secondary']
8 = ['secondary']
9 = ['secondary']

Terminal_1 = ['main']
Web_1 = ['main']
IDE_1 = ['main']
Communication_1 = ['main']

Terminal_2 = ['secondary']
Web_2 = ['secondary']
IDE_2 = ['secondary']
Communication_2 = ['secondary']

# Service mode for advanced operations
[mode.service.binding]
esc = ['exec-and-forget aerospace reload-config˛', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# Join windows
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# Application-specific window handling
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.window-title-regex-substring = '(Copy|Move|Delete)'
run = 'layout floating'
