# AeroSpace Configuration for German QWERTZ Keyboard
# Location: ~/.config/aerospace/aerospace.toml

config-version = 2
# Start AeroSpace at login
start-at-login = true

# Commands to run after AeroSpace startup
# 'exec-and-forget sketchybar',
after-startup-command = [
    'exec-and-forget borders'
]

# Callback when workspace changes (integrates with SketchyBar)
#exec-on-workspace-change = [
#    '/bin/bash', '-c',
#    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
#]

# Normalization settings
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout settings
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Don't automatically hide apps
automatically-unhide-macos-hidden-apps = false

# Keyboard layout for German QWERTZ
[key-mapping]
preset = 'qwerty'
# Note: Use physical key positions, AeroSpace handles the layout

# Window gaps (Catppuccin aesthetic)
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.bottom = 10
outer.top = 10    # Space for SketchyBar `50`
outer.right = 10

# Main binding mode - German keyboard compatible
[mode.main.binding]

# Use Alt (Option) as main modifier (German keyboard friendly)
# Avoid Ctrl+Alt combinations as they conflict with AltGr on German keyboards

# Layout management
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus navigation (HJKL - VI-style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize windows
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Workspace navigation (1-9 and letters)
# These work on German QWERTZ keyboards
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Letter-based workspaces (A-Z)
alt-t = 'workspace T'  # Terminal
alt-w = 'workspace W'  # Web
alt-e = 'workspace E'  # Editor
alt-m = 'workspace M'  # Mail
alt-c = 'workspace C'  # Chat

# Move windows to workspaces (with focus follows)
alt-shift-1 = ['move-node-to-workspace 1', '--focus-follows-window']
alt-shift-2 = ['move-node-to-workspace 2', '--focus-follows-window']
alt-shift-3 = ['move-node-to-workspace 3', '--focus-follows-window']
alt-shift-4 = ['move-node-to-workspace 4', '--focus-follows-window']
alt-shift-5 = ['move-node-to-workspace 5', '--focus-follows-window']
alt-shift-6 = ['move-node-to-workspace 6', '--focus-follows-window']
alt-shift-7 = ['move-node-to-workspace 7', '--focus-follows-window']
alt-shift-8 = ['move-node-to-workspace 8', '--focus-follows-window']
alt-shift-9 = ['move-node-to-workspace 9', '--focus-follows-window']

alt-shift-t = ['move-node-to-workspace T', '--focus-follows-window']
alt-shift-w = ['move-node-to-workspace W', '--focus-follows-window']
alt-shift-e = ['move-node-to-workspace E', '--focus-follows-window']
alt-shift-m = ['move-node-to-workspace M', '--focus-follows-window']
alt-shift-c = ['move-node-to-workspace C', '--focus-follows-window']

# Workspace back and forth
alt-tab = 'workspace-back-and-forth'

# Multi-monitor support
alt-shift-left = 'move-workspace-to-monitor left'
alt-shift-right = 'move-workspace-to-monitor right'

# Enter service mode
alt-shift-semicolon = 'mode service'

# Service mode for advanced operations
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# Join windows
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# Application-specific window handling
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.window-title-regex-substring = '(Copy|Move|Delete)'
run = 'layout floating'
