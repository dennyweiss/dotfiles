# AeroSpace Configuration for German QWERTZ Keyboard

# Start AeroSpace at login
start-at-login = false

# Commands to run after AeroSpace startup
# 'exec-and-forget sketchybar',
after-startup-command = [
    'exec-and-forget borders'
]

# Callback when workspace changes (integrates with SketchyBar)
#exec-on-workspace-change = [
#    '/bin/bash', '-c',
#    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
#]

# Normalization settings
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout settings
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Don't automatically hide apps
automatically-unhide-macos-hidden-apps = false

# Keyboard layout for German QWERTZ
[key-mapping]
    preset = 'qwerty'
# Note: Use physical key positions, AeroSpace handles the layout

# Window gaps (Catppuccin aesthetic)
[gaps]
    inner.horizontal = 10
    inner.vertical = 10
    outer.left = 6
    outer.bottom = 6
    outer.top = 6    # Space for SketchyBar `50`
    outer.right = 6

# Main binding mode - German keyboard compatible
[mode.main.binding]

# Use Alt (Option) as main modifier (German keyboard friendly)
# Avoid Ctrl+Alt combinations as they conflict with AltGr on German keyboards

# Layout management
alt-shift-comma = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion vertical horizontal'

# Focus navigation (HJKL - VI-style)
alt-h = 'focus left'
alt-u = 'focus up'
alt-j = 'focus down'
alt-k = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-u = 'move up'
alt-shift-j = 'move down'
alt-shift-k = 'move right'

# Resize windows
alt-o = 'resize smart -50'
alt-shift-o = 'resize smart -400'
alt-p = 'resize smart +50'
alt-shift-p = 'resize smart +400'

# Workspace navigation (1-9 and letters)
# These work on German QWERTZ keyboards
alt-a = 'workspace A_1'
alt-s = 'workspace S_1'
alt-d = 'workspace D_1'
alt-f = 'workspace F_1'

alt-ctrl-a = 'workspace A_2'
alt-ctrl-s = 'workspace S_2'
alt-ctrl-d = 'workspace D_2'
alt-ctrl-f = 'workspace F_2'

# Letter-based workspaces (A-Z)
alt-t = 'workspace Terminal_1'  # Terminal
alt-w = 'workspace Web_1'  # Web
alt-i = 'workspace IDE_1'  # Editor
alt-c = 'workspace Communication_1'  # Communication
alt-m = 'workspace Media_1'  # Communication
alt-ctrl-t = 'workspace Terminal_2'  # Terminal
alt-ctrl-w = 'workspace Web_2'  # Web
alt-ctrl-i = 'workspace IDE_2'  # Editor
alt-ctrl-c = 'workspace Communication_2'  # Communication
alt-ctrl-m = 'workspace Media_2'  # Communication

# Move windows to workspaces (with focus follows)
alt-shift-a = ['move-node-to-workspace A_1 --focus-follows-window']
alt-shift-s = ['move-node-to-workspace S_1 --focus-follows-window']
alt-shift-d = ['move-node-to-workspace D_1 --focus-follows-window']
alt-shift-f = ['move-node-to-workspace F_1 --focus-follows-window']

alt-ctrl-shift-a = ['move-node-to-workspace A_2 --focus-follows-window']
alt-ctrl-shift-s = ['move-node-to-workspace S_2 --focus-follows-window']
alt-ctrl-shift-d = ['move-node-to-workspace D_2 --focus-follows-window']
alt-ctrl-shift-f = ['move-node-to-workspace F_2 --focus-follows-window']

alt-shift-t = ['move-node-to-workspace Terminal_1 --focus-follows-window']
alt-shift-w = ['move-node-to-workspace Web_1 --focus-follows-window']
alt-shift-i = ['move-node-to-workspace IDE_1 --focus-follows-window']
alt-shift-c = ['move-node-to-workspace Communication_1 --focus-follows-window']
alt-shift-m =  ['move-node-to-workspace Media_1 --focus-follows-window']

alt-ctrl-shift-t = ['move-node-to-workspace Terminal_2 --focus-follows-window']
alt-ctrl-shift-w = ['move-node-to-workspace Web_2 --focus-follows-window']
alt-ctrl-shift-i = ['move-node-to-workspace IDE_2 --focus-follows-window']
alt-ctrl-shift-c = ['move-node-to-workspace Communication_2 --focus-follows-window']
alt-ctrl-shift-m = ['move-node-to-workspace Media_2 --focus-follows-window']

# Workspace back and forth
alt-tab = 'workspace-back-and-forth'

# Multi-monitor support
# @TODO add multimonitor setup
# alt-f1 = 'move-workspace-to-monitor left'
# alt-f2 = 'move-workspace-to-monitor right'

[workspace-to-monitor-force-assignment]
A_1 = ['main']
S_1 = ['main']
D_1 = ['main']
F_1 = ['main']

A_2 = ['secondary']
S_2 = ['secondary']
D_2 = ['secondary']
F_2 = ['secondary']

Terminal_1 = ['main']
Web_1 = ['main']
IDE_1 = ['main']
Communication_1 = ['main']
Media_1 = ['main']

Terminal_2 = ['secondary']
Web_2 = ['secondary']
IDE_2 = ['secondary']
Communication_2 = ['secondary']
Media_2 = ['secondary']

# Service mode for advanced operations

# Enter service mode
alt-ctrl-shift-comma = 'mode service'

[mode.service.binding]
esc = ['exec-and-forget aerospace reload-config˛', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# Join windows
alt-shift-h = ['join-with left', 'mode main']
alt-shift-u = ['join-with up', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with right', 'mode main']

# Application-specific window handling
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.runningwithcrayons.Alfred-Preferences'
if.window-title-regex-substring = 'Alfred Preferences'
run = 'layout floating'

# ////////////////////////////////////////////////////////////////
# // COMMUNICATION ///////////////////////////////////////////////

# // Discord //////////////////////
[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace Communication_1'

# // Messages //////////////////////
[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
check-further-callbacks = true
run = 'move-node-to-workspace Communication_1'

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = "layout floating"

# // Telegram //////////////////////
[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
check-further-callbacks = true
run = 'move-node-to-workspace Communication_1'

[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = "layout floating"


# // WhatsApp //////////////////////
[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
check-further-callbacks = true
run = 'move-node-to-workspace Communication_1'

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
if.window-title-regex-substring = 'WhatsApp'
run = "layout floating"

# // Apple Mail && Calendar ///////////////////
[[on-window-detected]]
if.app-id = 'com.apple.mail'
check-further-callbacks = true
run = 'move-node-to-workspace Communication_1'

[[on-window-detected]]
if.app-id = 'com.apple.mail'
if.window-title-regex-substring = 'Neue E-Mail'
run = ['layout floating', 'move-node-to-workspace Communication_1']

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
check-further-callbacks = true
run = 'move-node-to-workspace Communication_1'

# // TOOLS /////////////////////////////////////////////////////////
[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.fujitsu.pfu.ScanSnapHome'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.moneymoney-app.retail'
run = ['layout floating']

